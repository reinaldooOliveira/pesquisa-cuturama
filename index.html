<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>

<body>

    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>
                <!-- DADOS PESSOAIS -->
                <legend>Dados Pessoais</legend>
                <label for="userName">Nome</label>
                <input type="text" name="userName" required>
                <br>
                <label for="userAge">Idade</label>
                <input type="number" name="userAge" min="12" max="100" required>
                <br>
                <label for="birthDate">Data de Nascimento</label>
                <input type="date" name="birthDate">
                <br>
                <label for="userEmail">Email</label>
                <input type="email" name="userEmail" required>
                <br>
                <label for="userPhone">Telefone</label>
                <input type="tel" name="userPhone" pattern="[0-9]{11}" placeholder="DDD + number" required>
                <br>
                <label for="UserImage">Upload de fotos</label>
                <input type="file" name="UserImage" required>
                <br>

            </fieldset>

            <fieldset>
                <legend>Perfil</legend>
                <p>Genero:</p>
                <input type="radio" name="userGender" value="Feminino">
                <label for="userGender">Feminino</label>

                <input type="radio" name="userGender" value="Masculino">
                <label for="userGender">Masculino</label>

                <input type="radio" name="userGender" value="Não Definido">
                <label for="userGender">Não Definido</label>
                <br>
                <label for="maritalStatus">Estado Civil:</label>
                <select name="maritalStatus" id="">
                    <option value="notInformed">Selecione...</option>
                    <option value="Casado">Casado</option>
                    <option value="Solteiro">Solteiro(a)</option>
                    <option value="Viuvo(a)">Viuvo(a)</option>
                    <option value="Divorsiado">Divorsiado</option>
                    <option value="União Estavel">União Estavel</option>
                </select>

                <label for="userStates">Estado:</label>
                <select name="userStates" id="">
                    
                    <option value="notInformed">Selecione...</option>
                    <option value="acre">Acre</option>
                    <option value="alagoas">Alagoas</option>
                    <option value="amapa">Amapá</option>
                    <option value="amazonas">Amazonas</option>
                    <option value="bahia">bahia</option>
                    <option value="ceara">Ceará</option>
                    <option value="distritoFederal"> Distrito Federal</option>
                    <option value="espíritoSanto"> Espírito Santo</option>
                    <option value="goias">Goiás</option>
                    <option value="maranhao">Maranhão</option>
                    <option value="matoGrossoDoSul"> Mato Grosso do Sul</option>
                    <option value="MatoGrosso"> Mato Grosso</option>
                    <option value="minasGerais"> Minas Gerais</option>
                    <option value="para">Pára</option>
                    <option value="paraíba">Paraíba</option>
                    <option value="parana">Paraná</option>
                    <option value="pernambuco">Pernambuco</option>
                    <option value="piaui">Piauí</option>
                    <option value="rioDeJaneiro"> Rio de Janeiro</option>
                    <option value="rioGrandeDoNorte"> Rio Grande do Norte</option>
                    <option value="rioGrandeDoSul"> Rio Grande do Sul</option>
                    <option value="rondonia">Rondônia</option>
                    <option value="roraima">Roraima</option>
                    <option value="santaCatarina"> Santa Catarina</option>
                    <option value="saoPaulo"> São Paulo</option>
                    <option value="sergipe">Sergipe</option>
                    <option value="tocantins">Tocantins</option>
                </select>

                <label for="userCity">Cidade:</label>
                <input type="text" name="userCity" required>

            </fieldset>

            <button type="submit">Enviar</button>
        </form>
    </section>


</body>

</html>
